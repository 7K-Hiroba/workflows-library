name: "Bootstrap: Artifact Hub repos"

on:
  workflow_call:
    inputs:
      org:
        description: Artifact Hub organization slug
        required: true
        type: string
      registry-base:
        description: OCI base path (e.g. harbor.7kgroup.org/7khiroba/charts)
        required: true
        type: string
      charts:
        description: |
          JSON array of chart entries. Each entry:
            { "file": "helm/base-artifacthub-repo.yml",
              "chart": "my-app",
              "displayName": "My App" }
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Create missing Artifact Hub repos
        env:
          AH_API_KEY_ID: ${{ secrets.AH_API_KEY_ID }}
          AH_API_KEY_SECRET: ${{ secrets.AH_API_KEY_SECRET }}
          ORG: ${{ inputs.org }}
          REGISTRY_BASE: ${{ inputs.registry-base }}
          CHARTS: ${{ inputs.charts }}
        run: |
          set -euo pipefail
          jq -c '.[]' <<<"$CHARTS" > /tmp/charts.jsonl
          while IFS= read -r entry; do
            file=$(jq -r .file <<<"$entry")
            chart=$(jq -r .chart <<<"$entry")
            display=$(jq -r .displayName <<<"$entry")

            current=$(grep -E '^repositoryID:' "$file" | sed -E 's/^repositoryID:\s*"?([^"]*)"?\s*$/\1/')
            if [ -n "$current" ]; then
              echo "[$chart] repositoryID already set — skipping"
              continue
            fi

            echo "[$chart] creating Artifact Hub repo under org=$ORG"
            status=$(curl -sS -o /tmp/create.json -w "%{http_code}" \
              -X POST "https://artifacthub.io/api/v1/repositories/org/$ORG" \
              -H "X-API-KEY-ID: $AH_API_KEY_ID" \
              -H "X-API-KEY-SECRET: $AH_API_KEY_SECRET" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                    --arg name "$chart" \
                    --arg display "$display" \
                    --arg url "oci://$REGISTRY_BASE/$chart" \
                    '{name: $name, display_name: $display, url: $url, kind: 0}')")

            # 201 = created; 409 = already exists (someone made it in the UI) — both fine
            if [ "$status" != "201" ] && [ "$status" != "409" ]; then
              echo "AH create failed (HTTP $status): $(cat /tmp/create.json)"
              exit 1
            fi

            # On 201, AH returns the new repo (with repository_id) in the response body.
            # Prefer that over an immediate GET, which races against AH's read-side propagation.
            repo_id=$(jq -r '.repository_id // empty' /tmp/create.json 2>/dev/null || true)

            # On 409 (or if the 201 body lacked the field) — look it up, authenticated, with retries.
            if [ -z "$repo_id" ]; then
              for attempt in 1 2 3 4 5; do
                get_status=$(curl -sS -o /tmp/get.json -w "%{http_code}" \
                  -H "X-API-KEY-ID: $AH_API_KEY_ID" \
                  -H "X-API-KEY-SECRET: $AH_API_KEY_SECRET" \
                  "https://artifacthub.io/api/v1/repositories/helm/$ORG/$chart")
                if [ "$get_status" = "200" ]; then
                  repo_id=$(jq -r '.repository_id // empty' /tmp/get.json 2>/dev/null || true)
                  [ -n "$repo_id" ] && break
                fi
                echo "[$chart] AH GET attempt $attempt got HTTP $get_status, retrying in 5s..."
                sleep 5
              done
            fi

            if [ -z "$repo_id" ] || [ "$repo_id" = "null" ]; then
              echo "[$chart] could not retrieve repository_id from AH"
              echo "create.json: $(cat /tmp/create.json 2>/dev/null)"
              echo "get.json: $(cat /tmp/get.json 2>/dev/null)"
              exit 1
            fi
            echo "[$chart] repository_id=$repo_id"

            sed -i "s|^repositoryID: .*|repositoryID: \"$repo_id\"|" "$file"
          done < /tmp/charts.jsonl

      - name: Open PR with repositoryIDs
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bootstrap/artifacthub-repo-ids
          title: "ci: populate Artifact Hub repositoryIDs"
          commit-message: "ci: populate Artifact Hub repositoryIDs"
          body: |
            Auto-generated by the `bootstrap-artifacthub` workflow.

            Merging this PR will cause the `release-artifacthub-metadata` workflow
            to re-push each `artifacthub-repo.yml` to its OCI repository, which
            grants the **Verified Publisher** badge on the next Artifact Hub scan.
          delete-branch: true
