name: "CI: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            ${{ inputs.path }}/**/*.md
            !**/CHANGELOG.md
