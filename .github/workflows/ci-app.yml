name: "CI: App"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      image-name:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect runtime
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "runtime=node" >> "$GITHUB_OUTPUT"
          elif [ -f "go.mod" ]; then
            echo "runtime=go" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "runtime=python" >> "$GITHUB_OUTPUT"
          else
            echo "runtime=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & test (Node.js)
        if: steps.detect.outputs.runtime == 'node'
        run: |
          npm ci
          npm test --if-present

      - name: Setup Go
        if: steps.detect.outputs.runtime == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test (Go)
        if: steps.detect.outputs.runtime == 'go'
        run: go test ./...

      - name: Setup Python
        if: steps.detect.outputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Test (Python)
        if: steps.detect.outputs.runtime == 'python'
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install -e ".[test]" 2>/dev/null || true
          python -m pytest --tb=short 2>/dev/null || echo "No tests found"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.path }}
          push: false
          tags: ${{ inputs.image-name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.path }}
          push: false
          load: true
          tags: ${{ inputs.image-name }}:scan
          cache-from: type=gha

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ inputs.image-name }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
