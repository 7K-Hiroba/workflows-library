name: "CI: App"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      image-name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.path }}
          push: false
          tags: ${{ inputs.image-name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scan
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.path }}
          push: false
          load: true
          tags: ${{ inputs.image-name }}:scan
          cache-from: type=gha

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ inputs.image-name }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
