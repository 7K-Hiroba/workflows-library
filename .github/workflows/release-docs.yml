name: "Release: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string
      s3-bucket:
        description: "S3 bucket name for docs"
        required: false
        type: string
        default: ""
      s3-prefix:
        description: "S3 prefix path (defaults to repo name)"
        required: false
        type: string
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mkdocs
        run: pip install mkdocs-techdocs-core

      - name: Build TechDocs
        run: mkdocs build -f mkdocs.yml -d site

      - name: Set up s5cmd
        if: inputs.s3-bucket != ''
        uses: peak/action-setup-s5cmd@main
        with:
          version: v2.0.0

      - name: Publish docs to S3
        if: inputs.s3-bucket != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: garage
        run: |
          PREFIX="${{ inputs.s3-prefix }}"
          if [ -z "$PREFIX" ]; then
            PREFIX="${{ github.event.repository.name }}"
          fi
          s5cmd --endpoint-url=${{ secrets.DOCS_S3_ENDPOINT_URL }} sync --size-only --delete site/ "s3://${{ inputs.s3-bucket }}/${PREFIX}/"
          echo "Published docs v${{ inputs.version }} to ${{ inputs.s3-bucket }}/${PREFIX}/"
