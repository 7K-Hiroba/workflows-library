name: "Release: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up s5cmd
        uses: peak/action-setup-s5cmd@main
        with:
          version: v2.0.0

      - name: Publish docs to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: garage
        run: |
          PREFIX="${{ github.event.repository.name }}"
          s5cmd --endpoint-url=${{ secrets.DOCS_S3_ENDPOINT_URL }} sync --size-only --delete ${{ inputs.path }}/ "s3://${{ secrets.APPDOCS_S3_BUCKET }}/${PREFIX}/"
          echo "Published docs v${{ inputs.version }} to ${{ secrets.APPDOCS_S3_BUCKET }}/${PREFIX}/"

      - name: Generate Hiroba app token
        id: hiroba-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HIROBA_DISPATCH_APP_ID }}
          private-key: ${{ secrets.HIROBA_DISPATCH_APP_PRIVATE_KEY }}
          owner: 7K-Hiroba
          repositories: Hiroba

      - name: Trigger Hiroba docs deploy
        env:
          GH_TOKEN: ${{ steps.hiroba-token.outputs.token }}
          APP: ${{ github.event.repository.name }}
          VERSION: ${{ inputs.version }}
        run: |
          gh api -X POST /repos/7K-Hiroba/Hiroba/dispatches \
            -f event_type=docs-updated \
            -f "client_payload[app]=$APP" \
            -f "client_payload[version]=$VERSION"
