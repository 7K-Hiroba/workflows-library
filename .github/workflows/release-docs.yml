name: "Release: Docs"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string
      s3-bucket:
        description: "S3 bucket name for docs"
        required: false
        type: string
        default: ""
      s3-prefix:
        description: "S3 prefix path (defaults to repo name)"
        required: false
        type: string
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mkdocs
        run: pip install mkdocs-techdocs-core

      - name: Build TechDocs
        run: mkdocs build -f mkdocs.yml -d site

      - name: Publish docs to S3
        if: inputs.s3-bucket != ''
        env:
          RCLONE_CONFIG_DOCS_TYPE: s3
          RCLONE_CONFIG_DOCS_PROVIDER: Other
          RCLONE_CONFIG_DOCS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_DOCS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_DOCS_ENDPOINT: ${{ secrets.DOCS_S3_ENDPOINT_URL }}
        run: |
          PREFIX="${{ inputs.s3-prefix }}"
          if [ -z "$PREFIX" ]; then
            PREFIX="${{ github.event.repository.name }}"
          fi
          rclone sync site/ "docs:${{ inputs.s3-bucket }}/${PREFIX}/"
          echo "Published docs v${{ inputs.version }} to ${{ inputs.s3-bucket }}/${PREFIX}/"
