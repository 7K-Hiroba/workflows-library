name: "CI: Helm"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Lint chart
        run: helm lint ${{ inputs.path }}

  template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Template render
        run: helm template test-release ${{ inputs.path }}

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Install helm-unittest plugin
        # Helm 4 requires --verify=false for unsigned plugin sources
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Run unit tests
        run: helm unittest ${{ inputs.path }}

  test:
    needs: [lint, template, unittest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for values schema
        run: |
          if [ ! -f "${{ inputs.path }}/values.schema.json" ]; then
            echo "::error::Missing values.schema.json in ${{ inputs.path }}"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing lint
        run: ct lint --chart-dirs "$(dirname "${{ inputs.path }}")" --charts "${{ inputs.path }}"
