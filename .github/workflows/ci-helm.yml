name: "CI: Helm"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      kubernetes-version:
        required: false
        type: string
        default: "1.31.0"
        description: "Target Kubernetes version for kubeconform schema validation"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Lint chart
        run: helm lint ${{ inputs.path }}

  template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Load chart-local API versions
        id: api-versions
        run: |
          file="${{ inputs.path }}/.ci-api-versions"
          flags=""
          if [ -f "$file" ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              # Strip comments and whitespace
              entry="${line%%#*}"
              entry="$(echo -n "$entry" | tr -d '[:space:]')"
              [ -z "$entry" ] && continue
              flags="$flags --api-versions $entry"
            done < "$file"
          fi
          echo "flags=$flags" >> "$GITHUB_OUTPUT"
          echo "Resolved api-version flags:$flags"

      - name: Template render
        run: helm template test-release ${{ inputs.path }}${{ steps.api-versions.outputs.flags }}

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Run unit tests
        run: helm unittest ${{ inputs.path }}

  test:
    needs: [lint, template, unittest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for values schema
        run: |
          if [ ! -f "${{ inputs.path }}/values.schema.json" ]; then
            echo "::error::Missing values.schema.json in ${{ inputs.path }}"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing lint
        run: ct lint --chart-dirs "$(dirname "${{ inputs.path }}")" --charts "${{ inputs.path }}"

  helm-docs:
    name: Generate and push helm-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin helm-docs

      - name: Skip when no README.md.gotmpl is present
        id: gate
        run: |
          if [ -f "${{ inputs.path }}/README.md.gotmpl" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No README.md.gotmpl in ${{ inputs.path }} — skipping helm-docs."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect helm-docs loop
        id: loop-check
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == *"chore: update helm-docs"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and push helm-docs
        if: steps.gate.outputs.run == 'true' && steps.loop-check.outputs.skip != 'true'
        run: |
          helm-docs --chart-search-root "${{ inputs.path }}" --log-level warning
          if [ -n "$(git diff -- "${{ inputs.path }}/README.md")" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "${{ inputs.path }}/README.md"
            git commit -m "chore: update helm-docs"
            git push
          fi

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform

      - name: Install pluto
        run: |
          PLUTO_VERSION="5.21.0"
          curl -fsSL "https://github.com/FairwindsOps/pluto/releases/download/v${PLUTO_VERSION}/pluto_${PLUTO_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin pluto

      - name: Load chart-local API versions
        id: api-versions
        run: |
          file="${{ inputs.path }}/.ci-api-versions"
          flags=""
          if [ -f "$file" ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              entry="${line%%#*}"
              entry="$(echo -n "$entry" | tr -d '[:space:]')"
              [ -z "$entry" ] && continue
              flags="$flags --api-versions $entry"
            done < "$file"
          fi
          echo "flags=$flags" >> "$GITHUB_OUTPUT"

      - name: Validate rendered manifests
        run: |
          helm template test-release ${{ inputs.path }}${{ steps.api-versions.outputs.flags }} \
            | kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version "${{ inputs.kubernetes-version }}" \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datree/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary -

      - name: Check for deprecated APIs
        run: |
          helm template test-release ${{ inputs.path }}${{ steps.api-versions.outputs.flags }} \
            | pluto detect -
