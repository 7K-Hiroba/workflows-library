name: "Release: Artifact Hub metadata"

on:
  workflow_call:
    inputs:
      file:
        description: Path to the artifacthub-repo.yml file in the consuming repo
        required: true
        type: string
      chart:
        description: OCI chart name (e.g., bulwark-mail)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to Harbor (OCI)
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          echo "$HARBOR_ROBOT_TOKEN" | \
            oras login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin

      - name: Push Artifact Hub metadata
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          FILE: ${{ inputs.file }}
          CHART: ${{ inputs.chart }}
        run: |
          cp "$FILE" artifacthub-repo.yml
          oras push \
            "$HARBOR_REGISTRY/$HARBOR_PROJECT/charts/$CHART:artifacthub.io" \
            --artifact-type application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
