name: "Release: Helm"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string
    secrets:
      HARBOR_REGISTRY:
        required: true
      HARBOR_PROJECT:
        required: true
      HARBOR_ROBOT_NAME:
        required: true
      HARBOR_ROBOT_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # keyless cosign signing via Sigstore OIDC
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Update chart dependencies
        run: helm dependency update ${{ inputs.path }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Lint before publish
        run: helm lint ${{ inputs.path }}

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin helm-docs

      - name: Generate helm-docs
        env:
          CHART_PATH: ${{ inputs.path }}
        run: |
          helm-docs --chart-search-root "$CHART_PATH" --log-level warning

      - name: Login to Harbor (OCI)
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          echo "$HARBOR_ROBOT_TOKEN" | \
            helm registry login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin
          echo "$HARBOR_ROBOT_TOKEN" | \
            cosign login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin

      - name: Package chart
        id: package
        env:
          CHART_PATH: ${{ inputs.path }}
          CHART_VERSION: ${{ inputs.version }}
        run: |
          CHART_NAME=$(awk '/^name:/ {print $2; exit}' "$CHART_PATH/Chart.yaml")
          PACKAGE="${CHART_NAME}-${CHART_VERSION}.tgz"
          helm package "$CHART_PATH" --version "$CHART_VERSION"
          test -f "$PACKAGE"
          echo "name=$CHART_NAME" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Push to Harbor
        id: push
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          CHART_NAME: ${{ steps.package.outputs.name }}
          PACKAGE: ${{ steps.package.outputs.package }}
        run: |
          REF="oci://$HARBOR_REGISTRY/$HARBOR_PROJECT/charts"
          if ! OUTPUT=$(helm push "$PACKAGE" "$REF" 2>&1); then
            echo "$OUTPUT"
            exit 1
          fi
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          if [ -z "$DIGEST" ]; then
            echo "ERROR: could not parse digest from helm push output" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ref=$HARBOR_REGISTRY/$HARBOR_PROJECT/charts/$CHART_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign chart with cosign (keyless)
        run: cosign sign --yes "${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/7K-Hiroba/workflows-library/\.github/workflows/release-helm\.yml@.*$' \
            "${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}"
