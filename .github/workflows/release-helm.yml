name: "Release: Helm"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # keyless cosign signing via Sigstore OIDC
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Lint before publish
        run: helm lint ${{ inputs.path }}

      - name: Login to Harbor (OCI)
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
        run: |
          echo "$HARBOR_ROBOT_TOKEN" | \
            helm registry login "$HARBOR_REGISTRY" \
              --username "$HARBOR_ROBOT_NAME" \
              --password-stdin

      - name: Package chart
        id: package
        env:
          CHART_PATH: ${{ inputs.path }}
          CHART_VERSION: ${{ inputs.version }}
        run: |
          set -x
          echo "chart path:    $CHART_PATH"
          echo "chart version: $CHART_VERSION"
          ls -la "$CHART_PATH"
          cat "$CHART_PATH/Chart.yaml"
          CHART_NAME=$(awk '/^name:/ {print $2; exit}' "$CHART_PATH/Chart.yaml")
          PACKAGE="${CHART_NAME}-${CHART_VERSION}.tgz"
          echo "chart name: $CHART_NAME"
          echo "package:    $PACKAGE"
          helm package "$CHART_PATH" --version "$CHART_VERSION" --debug
          echo "---- produced tarballs ----"
          ls -la ./*.tgz
          test -f "$PACKAGE"
          echo "name=$CHART_NAME" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Push to Harbor
        id: push
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          CHART_NAME: ${{ steps.package.outputs.name }}
          PACKAGE: ${{ steps.package.outputs.package }}
        run: |
          set -x
          REF="oci://$HARBOR_REGISTRY/$HARBOR_PROJECT/charts"
          SIGN_REF="$HARBOR_REGISTRY/$HARBOR_PROJECT/charts/$CHART_NAME"
          echo "helm push ref: $REF"
          echo "sign ref:      $SIGN_REF"
          ls -la "$PACKAGE"
          set +e
          OUTPUT=$(helm push "$PACKAGE" "$REF" --debug 2>&1)
          STATUS=$?
          set -e
          echo "---- helm push output ----"
          echo "$OUTPUT"
          echo "---- helm push exit: $STATUS ----"
          if [ $STATUS -ne 0 ]; then
            echo "::error::helm push failed with exit $STATUS"
            exit $STATUS
          fi
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          if [ -z "$DIGEST" ]; then
            echo "::error::could not parse Digest from helm push output"
            exit 1
          fi
          echo "digest: $DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ref=$SIGN_REF" >> "$GITHUB_OUTPUT"

      - name: Sign chart with cosign (keyless)
        env:
          COSIGN_REF: ${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}
        run: |
          set -x
          echo "signing: $COSIGN_REF"
          cosign sign --yes --verbose "$COSIGN_REF"

      - name: Verify signature
        env:
          COSIGN_REF: ${{ steps.push.outputs.ref }}@${{ steps.push.outputs.digest }}
        run: |
          set -x
          echo "verifying: $COSIGN_REF"
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "github.com/${{ github.repository_owner }}/" \
            "$COSIGN_REF"
